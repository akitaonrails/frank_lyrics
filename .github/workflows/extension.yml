name: Extension CI and Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release from this ref"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

jobs:
  validate-and-package:
    name: Validate and package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JavaScript syntax
        run: |
          node --check src/content.js
          node --check src/background.js

      - name: Validate JSON
        run: |
          python3 -m json.tool manifest.json >/dev/null
          python3 -m json.tool data/sample-markers.json >/dev/null

      - name: Package extension
        run: python3 tools/package_extension.py

      - name: Upload packaged extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: frank-lyrics-extension
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: validate-and-package
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Package extension
        run: python3 tools/package_extension.py

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-{0}', github.run_number) }}
